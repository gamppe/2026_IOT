/* =========================================================

@import url('https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap');

:root {
  --bg:        #000000;
  --bg-2:      #050609;
  --bg-3:      #0a0d12;
  --line:      #1f3a5c;
  --line-dim:  #112340;

  --phos:      #9DD4FF;
  --phos-hi:   #E6F2FF;
  --phos-dim:  #5B89BD;
  --phos-deep: #2A4F7A;

  --high:      #FFD645;
  --low:       #FF5C72;
  --ok:        #5BFFA8;
  --warn:      #FFA040;
  --pos:       #FFB347;
  --neg:       #66D9FF;

  --glow:        0 0 5px rgba(157, 212, 255, 0.55), 0 0 14px rgba(157, 212, 255, 0.20);
  --glow-strong: 0 0 7px rgba(157, 212, 255, 0.80), 0 0 22px rgba(157, 212, 255, 0.40);
  --glow-high:   0 0 6px rgba(255, 214, 69, 0.75), 0 0 18px rgba(255, 214, 69, 0.35);
  --glow-low:    0 0 6px rgba(255, 92, 114, 0.75), 0 0 18px rgba(255, 92, 114, 0.35);
  --glow-ok:     0 0 6px rgba(91, 255, 168, 0.75), 0 0 18px rgba(91, 255, 168, 0.35);

  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --term: 'VT323', 'JetBrains Mono', monospace;
  --kr:   'IBM Plex Sans KR', system-ui, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--phos);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.45) 3px,
      rgba(0,0,0,0) 4px

  mix-blend-mode: multiply;
  z-index: 9000;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.7) 100%);
  z-index: 9001;
}

@keyframes crt-flicker {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.985; }
}
.crt-screen { animation: crt-flicker 4.2s infinite; }

<script type="text/babel" data-presets="react">
const SwitchCross = ({ pressed, bouncing }) => {
  const [jitter, setJitter] = React.useState(0);
  const [contactBreak, setContactBreak] = React.useState(false);

  React.useEffect(() => {
    if (!bouncing || !pressed) {
      setJitter(0);
      setContactBreak(false);
      return;
    }
    let alive = true;
    const tick = () => {
      if (!alive) return;
      setJitter((Math.random() - 0.5) * 2.4);
      setContactBreak(Math.random() < 0.45);
      setTimeout(tick, 35 + Math.random() * 40);
    };
    tick();
    return () => { alive = false; };
  }, [bouncing, pressed]);

  const plungerY = pressed ? 38 + jitter : 22;
  const contactClosed = pressed && !contactBreak;

  return (
    <svg viewBox="0 0 280 170" preserveAspectRatio="xMidYMid meet">
      <defs>

const { useState, useEffect, useRef, useCallback } = React;

const Scope = ({ voltage, vMax = 5, color = "#9DD4FF", label = "V_PIN" }) => {
  const W = 360, H = 150;
  const PAD_L = 28, PAD_R = 10, PAD_T = 16, PAD_B = 18;
  const PLOT_W = W - PAD_L - PAD_R;
  const PLOT_H = H - PAD_T - PAD_B;

  const yFor = (v) => PAD_T + PLOT_H * (1 - Math.max(0, Math.min(vMax, v)) / vMax);
  const HIGH_Y = yFor(vMax);
  const LOW_Y  = yFor(0);

  const bufRef = useRef([]);
  const N = 200;
  const [, setTick] = useState(0);

  useEffect(() => {
    let alive = true;
    const loop = () => {
      if (!alive) return;
      const buf = bufRef.current;
      buf.push(voltage);
      if (buf.length > N) buf.shift();
      setTick(x => x + 1);
      reqRef.current = requestAnimationFrame(loop);
    };
    const reqRef = { current: requestAnimationFrame(loop) };
    return () => { alive = false; cancelAnimationFrame(reqRef.current); };
  }, [voltage]);

  const buf = bufRef.current;
  const pts = buf.map((v, i) => {
    const x = PAD_L + (i / (N - 1)) * PLOT_W;
    const y = yFor(v);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id={`scopeGlow-${label}`} x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id={`scopeFill-${label}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={color} stopOpacity="0.22"/>
          <stop offset="1" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>

      <line x1={PAD_L} y1={HIGH_Y} x2={W - PAD_R} y2={HIGH_Y}
            stroke="#FFD645" strokeWidth="0.8" strokeDasharray="3 3" opacity="0.5"/>
      <line x1={PAD_L} y1={LOW_Y}  x2={W - PAD_R} y2={LOW_Y}
            stroke="#FF5C72" strokeWidth="0.8" strokeDasharray="3 3" opacity="0.5"/>
      <line x1={PAD_L} y1={yFor(vMax * 0.5)} x2={W - PAD_R} y2={yFor(vMax * 0.5)}
            stroke="#5B89BD" strokeWidth="0.6" strokeDasharray="2 4" opacity="0.45"/>

      <text x={PAD_L - 6} y={HIGH_Y + 3} fontFamily="JetBrains Mono, monospace" fontSize="8"
            fill="#FFD645" textAnchor="end" opacity="0.85">5V</text>
      <text x={PAD_L - 6} y={LOW_Y + 3} fontFamily="JetBrains Mono, monospace" fontSize="8"
            fill="#FF5C72" textAnchor="end" opacity="0.85">0V</text>
      <text x={PAD_L - 6} y={yFor(vMax * 0.5) + 3} fontFamily="JetBrains Mono, monospace" fontSize="7.5"
            fill="#5B89BD" textAnchor="end" opacity="0.7">V/2</text>

      <rect x={PAD_L} y={yFor(2.0)} width={PLOT_W} height={yFor(0.8) - yFor(2.0)}
            fill="#5B89BD" opacity="0.08"/>
      <text x={W - PAD_R - 4} y={yFor(1.4) + 2} fontFamily="JetBrains Mono, monospace" fontSize="7"
            fill="#5B89BD" textAnchor="end" opacity="0.6" letterSpacing="0.1em">TTL UNDEFINED</text>

      {pts && (
        <polygon
          points={`${PAD_L},${LOW_Y} ${pts} ${W - PAD_R},${LOW_Y}`}
          fill={`url(#scopeFill-${label})`}
          opacity="0.75"
        />
      )}

      {pts && (
        <polyline
          points={pts}
          stroke={color} strokeWidth="1.5"
          fill="none"
          filter={`url(#scopeGlow-${label})`}
          strokeLinejoin="round"
        />
      )}

      {buf.length > 0 && (
        <g>
          <circle cx={W - PAD_R} cy={yFor(buf[buf.length - 1])} r="3"
                  fill={color} style={{ filter: `drop-shadow(0 0 4px ${color})` }}/>
        </g>
      )}

      <text x={PAD_L} y={H - 4} fontFamily="JetBrains Mono, monospace" fontSize="8"
            fill="#5B89BD" letterSpacing="0.15em">t →</text>
      <text x={W - PAD_R} y={H - 4} fontFamily="JetBrains Mono, monospace" fontSize="8"
            fill="#5B89BD" textAnchor="end" letterSpacing="0.15em">100 ms/div</text>
    </svg>
  );
};

function computeVoltage(scenario, pressed, contactBreak, noise, noiseBias, rValue, t, debouncedPressed) {
  const VCC = 5.0;
  const effPressed = debouncedPressed != null ? debouncedPressed : pressed;
  const closed = effPressed && !contactBreak;

  let v;
  if (scenario === 'float') {
    if (closed) {
      v = VCC;
    } else {
      const slow  = Math.sin(t / 700) * 1.6 * noise;
      const hum60 = Math.sin(t / 2.65) * 0.7 * noise;
      const rand  = (Math.random() - 0.5) * 1.4 * noise;
      const bias  = 2.5 + noiseBias * 2.0;
      v = bias + slow + hum60 + rand;
      if (noise > 0.05 && Math.random() < 0.012 * noise) {
        v = Math.random() < 0.5 ? 0.2 : 4.7;
      }
    }
  } else if (scenario === 'pullup') {
    v = closed ? 0.0 : VCC;
    const n = noise * (0.05 + rValue / 200) * (Math.random() - 0.5) * 2;
    v += n;
  } else if (scenario === 'pulldown') {
    v = closed ? VCC : 0.0;
    const n = noise * (0.05 + rValue / 200) * (Math.random() - 0.5) * 2;
    v += n;
  }

  return Math.max(0, Math.min(VCC, v));
}

function useBouncingSwitch(rawPressed, mode) {
  const [contactBreak, setContactBreak] = useState(false);
  const [debouncedPressed, setDebouncedPressed] = useState(false);

  useEffect(() => {
    if (mode === 'ideal') {
      setContactBreak(false);
      return;
    }
    let alive = true;
    let timeouts = [];
    const burst = () => {
      const events = 8 + Math.floor(Math.random() * 5);
      let dt = 0;
      for (let i = 0; i < events; i++) {
        dt += 35 + Math.random() * 55;
        const broken = i % 2 === 0;
        timeouts.push(setTimeout(() => {
          if (alive) setContactBreak(broken);
        }, dt));
      }
      timeouts.push(setTimeout(() => {
        if (alive) setContactBreak(false);
      }, dt + 20));
    };
    burst();
    return () => {
      alive = false;
      timeouts.forEach(clearTimeout);
    };
  }, [rawPressed, mode]);

  useEffect(() => {
    if (mode === 'ideal' || mode === 'bouncing') {
      setDebouncedPressed(rawPressed);
      return;
    }
    const id = setTimeout(() => setDebouncedPressed(rawPressed), 140);
    return () => clearTimeout(id);
  }, [rawPressed, mode]);

  return { contactBreak, debouncedPressed };
}

const ScenarioCard = ({ kind, title, titleEn, tagText, pressed, contactBreak, debouncedPressed, mode, noise, noiseBias, rValue, notes, statusClass }) => {
  const [t, setT] = useState(0);

    let raf;
    const loop = () => { setT(performance.now()); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const voltage = computeVoltage(kind, pressed, contactBreak, noise, noiseBias, rValue, t, mode === 'debounced' ? debouncedPressed : null);
  const isHIGH = voltage > 3.3;

  if (kind === 'pulldown') Circuit = window.CircuitPullDown;

  const traceColor = kind === 'float' ? '#FF5C72' : kind === 'pullup' ? '#FFD645' : '#5BFFA8';

  return (

          <div className="scope-grid"></div>
          <div className="scope-label">CH1 · V_IN</div>
          <window.Scope voltage={voltage} color={traceColor} label={kind}/>
        </div>
      </div>

      <div className="panel">
        <div className="panel-label">[ 04 ] OUTPUT · LED + READOUT</div>
        <div className="readout">
          <div className={`led ${ledOn ? 'on' : ''}`}></div>
          <div className="led-label">
            INPUT
            <span className={`state ${stateLabel}`}>{stateLabel}</span>
          </div>
          <div className="volt-readout">
            {voltage.toFixed(2)}<span className="u">V</span>
          </div>
        </div>
      </div>

      <div className="notes">
        <ul>{notes.map((n, i) => <li key={i} dangerouslySetInnerHTML={{ __html: n }}/>)}</ul>
      </div>
    </div>
  );
};

const SummaryTable = () => (
  <div className="summary">
    <table>
      <thead>
        <tr>
          <th>구성</th>
          <th>평상시 입력</th>
          <th>버튼 누름</th>
          <th>특징 / 사용처</th>
          <th>위험</th>
        </tr>
      </thead>
      <tbody>
        <tr className="danger">
          <td>FLOATING</td>
          <td className="red">미정의</td>
          <td className="yel">HIGH</td>
          <td>없음 — <span className="em">절대 사용 금지</span></td>
          <td className="red">EMI · 60Hz hum · ESD에 취약, 핀이 안테나가 됨</td>
        </tr>
        <tr className="pullup">
          <td>PULL-UP</td>
          <td className="yel">HIGH (5V)</td>
          <td className="red">LOW (0V)</td>
          <td><span className="em">Active-LOW</span> · MCU 내장 풀업 (<span className="term">~50kΩ</span>) 사용 가능</td>
          <td>버튼 누른 동안 <span className="em">I = VCC/R</span> 정전류가 GND로 흐름</td>
        </tr>
        <tr className="pulldn">
          <td>PULL-DOWN</td>
          <td className="grn">LOW (0V)</td>
          <td className="yel">HIGH (5V)</td>
          <td><span className="em">Active-HIGH</span> · 직관적이지만 외부 저항 필요한 MCU多</td>
          <td>버튼 누른 동안 정전류가 VCC→핀→R→GND로 흐름</td>
        </tr>
      </tbody>
    </table>
  </div>
);

const FormulaBlock = () => (
  <div className="formula">
    <div>
      <h3>1 · 저항값(R) 선택</h3>
      <p>풀 저항은 <span style={{color:'var(--phos-hi)'}}>두 가지 트레이드오프</span> 사이에서 결정한다 — 너무 작으면 전류 낭비, 너무 크면 노이즈에 약해진다.</p>
      <span className="eq">I_pull = VCC / R&nbsp;&nbsp; →&nbsp; R = 10 kΩ ⇒ I = 0.5 mA @ 5V</span>
      <p>일반적으로 <strong style={{color:'var(--high)'}}>4.7 kΩ ~ 10 kΩ</strong> 범위가 표준. I²C 버스나 fast-edge 신호는 1~2 kΩ까지 낮춰 R·C 시상수를 줄이는 편이다.</p>

      <h3>2 · 입력 시상수와 노이즈</h3>
      <span className="eq">τ = R · C_in&nbsp;&nbsp; (C_in ≈ 5–10 pF)</span>
      <p>R이 100 kΩ이면 τ ≈ 1 μs로 느려져 <span style={{color:'var(--low)'}}>고속 신호가 무뎌진다</span>. 동시에 안테나 효과로 EMI 픽업이 ↑.</p>

      <h3>3 · TTL / CMOS 임계 전압</h3>
      <span className="eq">V_IL ≤ 0.8 V&nbsp;·&nbsp; V_IH ≥ 2.0 V&nbsp;(TTL @ 5V)</span>
      <p>그 사이 0.8–2.0 V가 <span style={{color:'var(--low)'}}>undefined</span> 영역. floating 핀은 정확히 이 영역에 머무르기 쉽다.</p>
    </div>
    <div>
      <h3>4 · 펌웨어 — Arduino 예시</h3>
      <pre>
<span className="com">// PULL-UP — Active-LOW: pressed == LOW</span>
<span className="kw">void</span> setup() &#123;
  pinMode(<span className="num">2</span>, INPUT_PULLUP);  <span className="com">// 내장 풀업 ON</span>
&#125;
<span className="kw">void</span> loop() &#123;
  <span className="kw">if</span> (digitalRead(<span className="num">2</span>) == LOW) &#123;
    <span className="com">// 버튼 누름 처리</span>
  &#125;
&#125;
      </pre>

      <h3>5 · 디바운스 — 소프트웨어</h3>
      <pre>
<span className="kw">unsigned long</span> last = <span className="num">0</span>;
<span className="kw">if</span> (digitalRead(BTN) != prev) &#123;
  <span className="kw">if</span> (millis() - last &gt; <span className="num">20</span>) &#123;  <span className="com">// 20ms 안정창</span>
    prev = digitalRead(BTN);
    last = millis();
    onChange(prev);
  &#125;
&#125;
      </pre>

      <h3>6 · RC 하드웨어 디바운스</h3>
      <span className="eq">τ = R · C&nbsp;·&nbsp; R=10kΩ, C=100nF ⇒ τ ≈ 1 ms</span>
      <p>버튼과 병렬로 100nF 커패시터 + 직렬로 10kΩ 풀업이면 모든 채터링이 RC 시정수로 평탄화된다.</p>
    </div>
  </div>
);

const App = () => {
  const [pressed, setPressed]     = useState(false);
  const [mode, setMode]           = useState('ideal');
  const [noise, setNoise]         = useState(0.3);
  const [noiseBias, setNoiseBias] = useState(0);
  const [rValue, setRValue]       = useState(10);

  const { contactBreak, debouncedPressed } = useBouncingSwitch(pressed, mode);

  useEffect(() => {
    const down = (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); setPressed(true); } };
    const up   = (e) => { if (e.code === 'Space') { e.preventDefault(); setPressed(false); } };
    window.addEventListener('keydown', down);
    window.addEventListener('keyup',   up);
    return () => { window.removeEventListener('keydown', down); window.removeEventListener('keyup', up); };
  }, []);

  return (
    <div className="app crt-screen">
      <div className="topbar">
        <div>
          <div className="brand-row">
            <span className="dot"></span>
            <span>EE 101 · DIGITAL I/O</span>
            <span style={{ color: '#2A4F7A' }}>·</span>
            <span>LECTURE 03</span>
          </div>
          <h1>풀업 · 풀다운 저항의 이해</h1>
          <div className="subtitle">Pull-Up &amp; Pull-Down Resistors — Why floating inputs are dangerous</div>
        </div>
        <div className="meta">
          <div className="row">SYS &nbsp;<span className="v">CRT-MK4</span></div>
          <div className="row">VCC &nbsp;<span className="v">5.000 V</span></div>
          <div className="row">CH1 &nbsp;<span className="v">1V / DIV</span></div>
          <div className="row">TIME&nbsp;<span className="v">100 ms / DIV</span></div>
        </div>
      </div>

      <div className="lede">
        <strong>왜 이 강의가 필요한가.</strong> 디지털 입력핀은 <span className="em">반드시 HIGH 또는 LOW 두 상태 중 하나</span>여야 한다.
        그러나 단순히 스위치만 핀에 연결하면, 스위치가 열려 있을 때 핀은 <span className="red">아무데도 연결되지 않은 채(floating) 떠다닌다</span>.
        이 떠다니는 핀은 주변의 전자기 잡음을 안테나처럼 픽업해서 <span className="red">예측 불가능하게</span> HIGH/LOW를 오간다 —
        결과적으로 누르지 않은 버튼이 눌린 것처럼 인식되거나, 누른 버튼이 무시된다. 이 강의는 이 문제를 해결하기 위한
        <span className="yel"> 풀업 저항</span>과 <span className="grn">풀다운 저항</span>의 두 가지 표준 패턴을, 단면도·회로도·오실로스코프·LED 출력의
        네 단계 가시화로 설명한다. 우측 패널의 <span className="em">PRESS SWITCH</span>(또는 스페이스바)로 직접 시도해보라.
      </div>

      <div className="controls">
        <div className="ctrl-group">
          <div className="ctrl-label">R · 저항값 (Pull resistor)</div>
          <div className="ctrl-row">
            <input type="range" min="1" max="100" step="1" value={rValue}
                   onChange={e => setRValue(+e.target.value)}/>
            <div className="ctrl-value">{rValue} kΩ</div>
          </div>
          <div className="ctrl-label" style={{ marginTop: 10 }}>NOISE · 외란 진폭</div>
          <div className="ctrl-row">
            <input type="range" min="0" max="100" step="1" value={Math.round(noise * 100)}
                   onChange={e => setNoise(+e.target.value / 100)}/>
            <div className="ctrl-value">{Math.round(noise * 100)} %</div>
          </div>
          <div className="ctrl-label" style={{ marginTop: 10 }}>BIAS · 외란 변위 (DC offset)</div>
          <div className="ctrl-row">
            <input type="range" min="-100" max="100" step="1" value={Math.round(noiseBias * 100)}
                   onChange={e => setNoiseBias(+e.target.value / 100)}/>
            <div className="ctrl-value">{noiseBias >= 0 ? '+' : ''}{(noiseBias * 2.5).toFixed(2)} V</div>
          </div>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
          <button
            className={`press-btn ${pressed ? 'active' : ''}`}
            onMouseDown={() => setPressed(true)}
            onMouseUp={() => setPressed(false)}
            onMouseLeave={() => setPressed(false)}
            onTouchStart={(e) => { e.preventDefault(); setPressed(true); }}
            onTouchEnd={(e)   => { e.preventDefault(); setPressed(false); }}
          >
            PRESS &nbsp;SWITCH
            <span className="key">[ HOLD · 스페이스 ]</span>
          </button>
          <div className="mode-radio">
            {[
              { id: 'ideal',     label: 'IDEAL',     sub: '이상' },
              { id: 'bouncing',  label: 'BOUNCING',  sub: '바운싱' },
              { id: 'debounced', label: 'DEBOUNCED', sub: '디바운싱' },
            ].map(o => (
              <label key={o.id} className={`mode-opt ${mode === o.id ? 'on' : ''}`}>
                <input type="radio" name="mode" checked={mode === o.id}
                       onChange={() => setMode(o.id)}/>
                <span className="m-l">{o.label}</span>
                <span className="m-s">{o.sub}</span>
              </label>
            ))}
          </div>
        </div>

        <div className="ctrl-group">
          <div className="ctrl-label" style={{ textAlign: 'right' }}>MODE 설명</div>
          <div style={{ fontSize: 11, color: 'var(--phos)', textAlign: 'right', lineHeight: 1.65, marginTop: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.04em' }}>
            {mode === 'ideal' && (
              <>
                <div><span style={{ color: 'var(--phos-hi)' }}>IDEAL</span> · 이상적 스위치</div>
                <div style={{ color: 'var(--phos-dim)', marginTop: 4 }}>접점이 즉시 깨끗하게 닫히고 열림.<br/>현실에는 존재하지 않는 가정.</div>
              </>
            )}
            {mode === 'bouncing' && (
              <>
                <div><span style={{ color: 'var(--low)' }}>BOUNCING</span> · 채터링 발생</div>
                <div style={{ color: 'var(--phos-dim)', marginTop: 4 }}>금속 접점이 충돌하며 ms 단위로<br/>여러 번 단속 → MCU가 다중 입력으로 오인.</div>
              </>
            )}
            {mode === 'debounced' && (
              <>
                <div><span style={{ color: 'var(--ok)' }}>DEBOUNCED</span> · 디바운싱 처리</div>
                <div style={{ color: 'var(--phos-dim)', marginTop: 4 }}>채터링은 그대로 발생하나 펌웨어/RC<br/>필터로 ~140ms 안정 후 단일 천이 출력.</div>
              </>
            )}
          </div>
        </div>
      </div>

      <div className="grid-3">
        <ScenarioCard
          kind="float"
          tagText="A · NO RESISTOR"
          title="저항이 없는 경우"
          titleEn="FLOATING INPUT"
          statusClass="danger"
          pressed={pressed}
          contactBreak={contactBreak}
          debouncedPressed={debouncedPressed}
          mode={mode}
          noise={noise}
          noiseBias={noiseBias}
          rValue={rValue}
          notes={[
            '스위치가 <span class="em">열려 있을 때 입력핀이 어디에도 연결되지 않음</span> → 전위가 미정의(undefined).',
            '핀에 연결된 도선이 <span class="red">안테나처럼 동작</span>하여 60Hz 전원선 잡음·EMI를 그대로 픽업.',
            '0.7 ~ 2.0V 사이의 <span class="red">불확정 영역</span>(TTL undefined zone)에 머무르며 HIGH/LOW가 임의로 변동.',
            '결과 — 누르지 않아도 LED가 깜박이거나, 누른 신호를 인식하지 못하는 <span class="red">치명적 오동작</span>.',
            '심지어 정전기(ESD) 한 번에 <span class="red">MCU 입력버퍼가 영구 손상</span>될 수 있다 (gate oxide breakdown).',
          ]}
        />
        <ScenarioCard
          kind="pullup"
          tagText="B · PULL-UP"
          title="풀업 저항 구성"
          titleEn="PULL-UP CONFIGURATION"
          statusClass="pullup"
          pressed={pressed}
          contactBreak={contactBreak}
          debouncedPressed={debouncedPressed}
          mode={mode}
          noise={noise}
          noiseBias={noiseBias}
          rValue={rValue}
          notes={[
            '저항이 입력핀과 <span class="yel">VCC를 약하게 연결</span> → 평상시(누르지 않을 때) <span class="yel">HIGH</span>로 고정.',
            '스위치를 누르면 핀이 GND로 직결되어 <span class="em">강하게 LOW</span>로 풀다운됨 → <span class="yel">Active-LOW 입력</span>.',
            'R이 작을수록 노이즈 면역은 ↑, 그러나 누를 때 흐르는 <span class="em">정전류 I = VCC / R</span>도 ↑.',
            '일반값 — <span class="em">4.7k ~ 10kΩ</span>. MCU 내장 풀업도 보통 이 범위 (AVR ≈ 50kΩ, STM32 ≈ 40kΩ).',
            '<span class="term">pinMode(pin, INPUT_PULLUP)</span> 한 줄로 외부 저항 없이 사용 가능 — 가장 흔한 패턴.',
          ]}
        />
        <ScenarioCard
          kind="pulldown"
          tagText="C · PULL-DOWN"
          title="풀다운 저항 구성"
          titleEn="PULL-DOWN CONFIGURATION"
          statusClass="pulldn"
          pressed={pressed}
          contactBreak={contactBreak}
          debouncedPressed={debouncedPressed}
          mode={mode}
          noise={noise}
          noiseBias={noiseBias}
          rValue={rValue}
          notes={[
            '저항이 입력핀과 <span class="grn">GND를 약하게 연결</span> → 평상시 <span class="grn">LOW</span>로 고정.',
            '스위치를 누르면 핀이 VCC로 직결되어 <span class="em">강하게 HIGH</span>로 풀업됨 → <span class="grn">Active-HIGH 입력</span>.',
            '직관적이지만 — 일부 MCU(예: AVR 8비트)는 <span class="em">내장 풀업만 지원</span>(내장 풀다운 없음). 이 경우 외부 저항 필요.',
            'STM32, ESP32 등 최신 MCU는 <span class="em">내장 풀다운</span>도 지원 — datasheet에서 GPIO 설정 옵션 확인.',
            '바운싱은 동일하게 발생 → SW + RC 디바운스 또는 펌웨어 디바운스 필수.',
          ]}
        />
      </div>

      <SummaryTable/>
      <FormulaBlock/>

      <div className="foot">
        <div>SIGNAL · GOOD</div>
        <div>END OF LECTURE 03 · LINE 256/256</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
